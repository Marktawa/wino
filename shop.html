<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <title>Shop — Winteriors</title>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --text: #292929;
            --bg: #FFFFFF;
            --bg-subtle: #F5F5F5;
            --border: #EAEAEA;
            --accent: #D1BC92;
        }

        .inverted {
            --text: #FFFFFF;
            --bg: #292929;
        }

        @font-face {
            font-family: 'Winteriors';
            src: url('font/Winteriors.woff2') format('woff2'),
                 url('font/Winteriors.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            margin: 0 auto;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        /* ── Top Bar ── */
        .topbar-wrapper {
            color: var(--text);
            background: var(--bg);
        }

        .topbar {
            max-width: 1140px;
            margin: 0 auto;
            height: 36px;
            display: flex;
            justify-content: space-between;
            padding: 0 8px;
        }

        .topbar .email {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 14px;
            line-height: 1;
        }

        .topbar .socials {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            color: #292929;
            text-decoration: none;
            font-size: 12px;
        }

        .topbar .socials a:hover {
            background: #D1BC92;
            opacity: 0.9;
            transform: scale(0.9);
        }

        /* ── Header ── */
        .header-wrapper {
            color: var(--text);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        header {
            max-width: 1140px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
        }

        header .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        header .logo img {
            height: 36px;
        }

        h1 {
            font-family: 'Winteriors', 'Times New Roman', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        header .quicklinks {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        header a {
            text-decoration: none;
            color: inherit;
        }

        header .quicklinks a {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 2px;
        }

        header .quicklinks a.active {
            border-bottom: 2px solid var(--accent);
            color: var(--text);
            font-weight: 700;
            margin-bottom: -2px;
        }

        /* ── Page Banner ── */
        .page-banner-wrapper {
            background: var(--bg-subtle);
            border-bottom: 1px solid var(--border);
        }

        .page-banner {
            max-width: 1140px;
            margin: 0 auto;
            padding: 48px 8px 40px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .page-banner h2 {
            font-size: 38px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
        }

        .breadcrumb {
            font-size: 13px;
            color: #7A7A7A;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .breadcrumb a {
            color: #7A7A7A;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: var(--accent);
        }

        .breadcrumb span {
            margin: 0 6px;
        }

        /* ── Filter Bar ── */
        .filter-bar-wrapper {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .filter-bar {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 8px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .filter-bar a {
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #7A7A7A;
            padding-bottom: 3px;
            transition: color 0.2s;
        }

        .filter-bar a:hover {
            color: var(--text);
        }

        .filter-bar a.active {
            color: var(--text);
            font-weight: 700;
            border-bottom: 2px solid var(--accent);
            margin-bottom: -4px;
        }

        /* ── Shop Grid ── */
        .shop-wrapper {
            background: var(--bg);
            padding: 50px 0 80px 0;
        }

        .shop-grid {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        /* ── Product Card (inherits home.html style) ── */
        .product-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: var(--text);
            gap: 0.75rem;
        }

        .product-card-image {
            background: var(--bg-subtle);
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
        }

        .product-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-card-image img {
            transform: scale(1.04);
        }

        .product-card-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-card-info .name {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .product-card-info .price {
            font-size: 13px;
            color: #7A7A7A;
        }

        /* ── Clients Strip ── */
        .clients-heading {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .our-clients-section {
            padding: 50px 0 100px 0;
            overflow: hidden;
            max-width: 1140px;
            margin: 0 auto;
        }

        .clients-track {
            display: flex;
            align-items: center;
            gap: 60px;
            width: max-content;
            animation: step-scroll 50s ease-in-out infinite;
        }

        .clients-track img {
            height: auto;
            width: 150px;
            object-fit: contain;
            flex-shrink: 0;
        }

        @keyframes step-scroll {
            0%, 3%   { transform: translateX(0); }
            6%, 9%   { transform: translateX(-210px); }
            12%, 15% { transform: translateX(-420px); }
            18%, 21% { transform: translateX(-630px); }
            24%, 27% { transform: translateX(-840px); }
            30%, 33% { transform: translateX(-1050px); }
            36%, 39% { transform: translateX(-1260px); }
            42%, 45% { transform: translateX(-1470px); }
            48%, 51% { transform: translateX(-1680px); }
            54%, 57% { transform: translateX(-1890px); }
            60%, 63% { transform: translateX(-2100px); }
            66%, 69% { transform: translateX(-2280px); }
            100%     { transform: translateX(0); }
        }

        .clients-track:hover {
            animation-play-state: paused;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .shop-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.25rem;
            }

            .page-banner h2 {
                font-size: 28px;
            }

            .filter-bar {
                gap: 1.25rem;
                overflow-x: auto;
            }
        }

        @media (max-width: 480px) {
            .shop-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
