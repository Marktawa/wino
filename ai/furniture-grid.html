<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Furniture Grid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ccc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 340px 340px;
      gap: 10px;
      width: 100%;
      max-width: 1100px;
    }

    .card-lamp {
      grid-column: 1;
      grid-row: 1 / 3;
      background: #ede9e4;

      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 1fr 1fr;
      padding: 24px;
    }

    .card-lamp img {
      grid-column: 1;
      grid-row: 1 / 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
    }

    .card-lamp .title {
      grid-column: 2;
      grid-row: 1;
      align-self: start;
      text-align: right;
    }

    .card-lamp .cta-block {
      grid-column: 2;
      grid-row: 2;
      align-self: end;
      text-align: right;
      text-wrap: nowrap;
    }

    .card-lamp .cta-block p {
      padding-bottom: 20px;
    }

    .card-dresser {
      grid-column: 2;
      grid-row: 1;
      background: #f5f2ee;
    }

    .card-sofa {
      grid-column: 2;
      grid-row: 2;
      background: #f5f2ee;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="card-lamp">
      <img src="lamp.png" alt="Floor lamp" />
      <div class="title">LAMP & TABLE</div>
      <div class="cta-block">
        <p>Discover this week's new arrivals</p>
        <a href="#">DISCOVER NOW →</a>
      </div>
    </div>
    <div class="card-dresser"></div>
    <div class="card-sofa"></div>
  </div>
</body>
</html>
